name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Triggered on version tag push (e.g., v1.0.0)
  workflow_dispatch:  # Allow manual trigger for testing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  WHISPER_CPP_VERSION: v1.8.4

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: node20-macos-arm64
            artifact: whooptido-asr-captions-macos-arm
            arch: arm64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npx pkg native-host.js --target ${{ matrix.target }} --no-bytecode --public --public-packages "*" --output dist/${{ matrix.artifact }}

      # --- Apple Code Signing & Notarization ---
      - name: Import signing certificate
        if: env.APPLE_CERTIFICATE_P12 != ''
        continue-on-error: true
        id: import-cert
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_INSTALLER_CERT_P12: ${{ secrets.APPLE_INSTALLER_CERT_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Decode certificates
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > certificate.p12
          if [ -n "$APPLE_INSTALLER_CERT_P12" ]; then
            echo "$APPLE_INSTALLER_CERT_P12" | base64 --decode > installer.p12
          fi

          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import Application certificate
          security import certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            
          # Import Installer certificate (if available)
          if [ -f installer.p12 ]; then
            security import installer.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          fi
            
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Clean up
          rm -f certificate.p12 installer.p12

      - name: Sign binary
        if: steps.import-cert.outcome == 'success'
        continue-on-error: true
        id: sign-binary
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            --timestamp \
            dist/${{ matrix.artifact }}
          # Verify signature
          codesign --verify --verbose dist/${{ matrix.artifact }}

      - name: Notarize binary
        if: steps.sign-binary.outcome == 'success'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Zip for notarization (Apple requires zip or dmg)
          cd dist
          zip ${{ matrix.artifact }}.zip ${{ matrix.artifact }}

          # Submit for notarization
          xcrun notarytool submit ${{ matrix.artifact }}.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          # Staple (works on the binary directly for command-line tools)
          # Note: stapler only works on .app, .dmg, .pkg — for standalone binaries,
          # Gatekeeper checks online. The notarization itself is what matters.
          rm ${{ matrix.artifact }}.zip
          cd ..

      # --- Build .pkg installer for macOS ---
      - name: Build .pkg installer
        run: |
          # Create staging payload
          mkdir -p pkg-root/usr/local/whooptido-staging
          cp dist/${{ matrix.artifact }} pkg-root/usr/local/whooptido-staging/whooptido-asr-captions
          chmod +x pkg-root/usr/local/whooptido-staging/whooptido-asr-captions

          # Extract version from tag (strip 'v' prefix)
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-1.0.0}"

          # Build the .pkg
          pkgbuild \
            --root pkg-root \
            --identifier com.whooptido.asr-captions \
            --version "$VERSION" \
            --install-location / \
            --scripts scripts/macos-pkg \
            dist/${{ matrix.artifact }}.pkg

          echo "Built: dist/${{ matrix.artifact }}.pkg"
          ls -la dist/${{ matrix.artifact }}.pkg

      - name: Sign .pkg installer
        if: steps.import-cert.outcome == 'success'
        continue-on-error: true
        env:
          APPLE_INSTALLER_IDENTITY: ${{ secrets.APPLE_INSTALLER_IDENTITY }}
        run: |
          # Sign .pkg with installer identity (if available)
          # Falls back to unsigned pkg if APPLE_INSTALLER_IDENTITY is not set
          if [ -n "$APPLE_INSTALLER_IDENTITY" ]; then
            productsign --sign "$APPLE_INSTALLER_IDENTITY" \
              dist/${{ matrix.artifact }}.pkg \
              dist/${{ matrix.artifact }}-signed.pkg
            mv dist/${{ matrix.artifact }}-signed.pkg dist/${{ matrix.artifact }}.pkg
            echo "Signed .pkg installer"
          else
            echo "No installer signing identity — using unsigned .pkg"
          fi

      - name: Notarize .pkg installer
        if: steps.sign-binary.outcome == 'success'
        continue-on-error: true
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit dist/${{ matrix.artifact }}.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || true

          # Staple the notarization ticket to the .pkg
          xcrun stapler staple dist/${{ matrix.artifact }}.pkg || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-pkg
          path: dist/${{ matrix.artifact }}.pkg

  build-windows:
    runs-on: windows-latest
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      AZURE_CODESIGN_ENDPOINT: https://eus.codesigning.azure.net/
      AZURE_CODESIGN_ACCOUNT_NAME: Whooptido
      AZURE_CODESIGN_PROFILE_NAME: whooptido-windows-public

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build binary
        run: npx pkg native-host.js --target node20-win-x64 --no-bytecode --public --public-packages "*" --output dist/whooptido-asr-captions-windows-x64

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sign Windows binary
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_CODESIGN_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\dist\whooptido-asr-captions-windows-x64.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Prepare whisper.cpp source
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $sourcePath = Join-Path $env:RUNNER_TEMP 'whisper.cpp'
          git clone --depth 1 --branch $env:WHISPER_CPP_VERSION https://github.com/ggml-org/whisper.cpp.git $sourcePath
          "WHISPER_CPP_SOURCE=$sourcePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.4.0'
          method: 'network'

      - name: Build NVIDIA CUDA whisper.cpp Windows runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $runtimePath = Join-Path $env:GITHUB_WORKSPACE 'dist\whisper-runtime-cuda'
          $sourcePath = $env:WHISPER_CPP_SOURCE
          $buildPath = Join-Path $env:RUNNER_TEMP 'whisper.cpp-cuda-build'
          $cudaBin = Join-Path $env:CUDA_PATH 'bin'
          if (-not (Test-Path -LiteralPath $cudaBin)) {
            throw "CUDA Toolkit bin directory was not found: $cudaBin"
          }

          cmake `
            -S $sourcePath `
            -B $buildPath `
            -A x64 `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DWHISPER_BUILD_SERVER=OFF `
            -DWHISPER_CURL=OFF `
            -DWHISPER_SDL2=OFF `
            -DWHISPER_OPENVINO=OFF `
            -DGGML_NATIVE=OFF `
            -DGGML_SSE42=OFF `
            -DGGML_AVX=OFF `
            -DGGML_AVX2=OFF `
            -DGGML_BMI2=OFF `
            -DGGML_FMA=OFF `
            -DGGML_F16C=OFF `
            -DGGML_AVX512=OFF `
            -DGGML_BLAS=OFF `
            -DGGML_OPENMP=OFF `
            -DGGML_VULKAN=OFF `
            -DGGML_CUDA=ON `
            -DGGML_CPU_ALL_VARIANTS=OFF `
            "-DCMAKE_CUDA_ARCHITECTURES=61;75;86;89"

          cmake --build $buildPath --config Release --target whisper-cli --parallel

          New-Item -ItemType Directory -Force -Path $runtimePath | Out-Null

          $requiredBuildFiles = @(
            'whisper-cli.exe',
            'whisper.dll',
            'ggml.dll',
            'ggml-base.dll',
            'ggml-cpu.dll',
            'ggml-cuda.dll'
          )
          foreach ($fileName in $requiredBuildFiles) {
            $file = Get-ChildItem -LiteralPath $buildPath -Recurse -File -Filter $fileName | Select-Object -First 1
            if (-not $file) {
              throw "$fileName was not produced by the CUDA whisper.cpp build"
            }
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path $runtimePath $file.Name) -Force
          }

          $cudaRedistributablePatterns = @(
            'cudart64_*.dll',
            'cublas64_*.dll',
            'cublasLt64_*.dll',
            'nvrtc64_*.dll',
            'nvrtc-builtins64_*.dll'
          )
          foreach ($pattern in $cudaRedistributablePatterns) {
            $files = Get-ChildItem -LiteralPath $cudaBin -File -Filter $pattern
            foreach ($file in $files) {
              Copy-Item -LiteralPath $file.FullName -Destination (Join-Path $runtimePath $file.Name) -Force
            }
          }

          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'whisper-cli.exe'))) {
            throw 'whisper-cli.exe was not found in the generated CUDA runtime package'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'ggml-cuda.dll'))) {
            throw 'ggml-cuda.dll was not found in the generated CUDA runtime package'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'cublas64_12.dll'))) {
            throw 'cublas64_12.dll was not found in the generated CUDA runtime package'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'cublasLt64_12.dll'))) {
            throw 'cublasLt64_12.dll was not found in the generated CUDA runtime package'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'cudart64_12.dll'))) {
            throw 'cudart64_12.dll was not found in the generated CUDA runtime package'
          }

          Write-Host 'Skipping CUDA whisper-cli launch probe on GitHub runners because ggml-cuda.dll imports nvcuda.dll from the NVIDIA driver.'

          Get-ChildItem -LiteralPath $runtimePath | Select-Object Name,Length | Format-Table -AutoSize

      - name: Install Vulkan SDK
        run: choco install vulkan-sdk -y --no-progress

      - name: Build AMD Vulkan whisper.cpp Windows runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $runtimePath = Join-Path $env:GITHUB_WORKSPACE 'dist\whisper-runtime-vulkan'
          $sourcePath = $env:WHISPER_CPP_SOURCE
          $buildPath = Join-Path $env:RUNNER_TEMP 'whisper.cpp-vulkan-build'
          $vulkanRoot = Join-Path $env:SystemDrive 'VulkanSDK'
          $vulkanSdk = Get-ChildItem -LiteralPath $vulkanRoot -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $vulkanSdk) {
            throw 'Vulkan SDK installation was not found'
          }

          $env:VULKAN_SDK = $vulkanSdk.FullName
          $env:Path = "$(Join-Path $vulkanSdk.FullName 'Bin');$env:Path"

          cmake `
            -S $sourcePath `
            -B $buildPath `
            -A x64 `
            -DWHISPER_BUILD_TESTS=OFF `
            -DWHISPER_BUILD_EXAMPLES=ON `
            -DWHISPER_BUILD_SERVER=OFF `
            -DWHISPER_CURL=OFF `
            -DWHISPER_SDL2=OFF `
            -DWHISPER_OPENVINO=OFF `
            -DGGML_NATIVE=OFF `
            -DGGML_BLAS=OFF `
            -DGGML_OPENMP=OFF `
            -DGGML_VULKAN=ON `
            -DGGML_CUDA=OFF `
            -DGGML_CPU_ALL_VARIANTS=OFF

          cmake --build $buildPath --config Release --target whisper-cli --parallel

          $cli = Get-ChildItem -LiteralPath $buildPath -Recurse -Filter whisper-cli.exe | Select-Object -First 1
          if (-not $cli) {
            throw 'whisper-cli.exe was not produced by the Vulkan whisper.cpp build'
          }

          New-Item -ItemType Directory -Force -Path $runtimePath | Out-Null

          $runtimeFiles = Get-ChildItem -LiteralPath $buildPath -Recurse -File | Where-Object {
            $_.Name -eq 'whisper-cli.exe' -or $_.Extension -eq '.dll'
          }
          foreach ($file in $runtimeFiles) {
            Copy-Item -LiteralPath $file.FullName -Destination (Join-Path $runtimePath $file.Name) -Force
          }

          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'whisper-cli.exe'))) {
            throw 'whisper-cli.exe was not found in the generated runtime package'
          }
          if (-not (Test-Path -LiteralPath (Join-Path $runtimePath 'ggml-vulkan.dll'))) {
            throw 'ggml-vulkan.dll was not found in the generated runtime package'
          }

          $probeOutput = & (Join-Path $runtimePath 'whisper-cli.exe') -h 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "Generated whisper-cli.exe failed health check with exit $LASTEXITCODE. Output: $($probeOutput | Out-String)"
          }

          Get-ChildItem -LiteralPath $runtimePath | Select-Object Name,Length | Format-Table -AutoSize

      - name: Sign Windows CUDA whisper runtime
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_CODESIGN_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist\whisper-runtime-cuda
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Sign Windows Vulkan whisper runtime
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_CODESIGN_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}\dist\whisper-runtime-vulkan
          files-folder-filter: exe,dll
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Package Windows whisper runtime zips
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packages = @(
            @{ Backend = 'cuda'; RuntimePath = 'dist\whisper-runtime-cuda'; ZipPath = 'dist\whooptido-whisper-runtime-windows-x64-cuda.zip'; ExpectedDll = 'ggml-cuda.dll'; ProbeOnCi = $false },
            @{ Backend = 'vulkan'; RuntimePath = 'dist\whisper-runtime-vulkan'; ZipPath = 'dist\whooptido-whisper-runtime-windows-x64-vulkan.zip'; ExpectedDll = 'ggml-vulkan.dll'; ProbeOnCi = $true }
          )

          foreach ($package in $packages) {
            $runtimePath = Join-Path $env:GITHUB_WORKSPACE $package.RuntimePath
            if ($package.ProbeOnCi) {
              $probeOutput = & (Join-Path $runtimePath 'whisper-cli.exe') -h 2>&1
              if ($LASTEXITCODE -ne 0) {
                throw "Signed $($package.Backend) whisper-cli.exe failed health check with exit $LASTEXITCODE. Output: $($probeOutput | Out-String)"
              }
            } else {
              Write-Host "Skipping $($package.Backend) whisper-cli launch probe on GitHub runner."
            }
            if (-not (Test-Path -LiteralPath (Join-Path $runtimePath $package.ExpectedDll))) {
              throw "$($package.ExpectedDll) is missing from the $($package.Backend) runtime package"
            }

            $runtimeZip = Join-Path $env:GITHUB_WORKSPACE $package.ZipPath
            if (Test-Path -LiteralPath $runtimeZip) {
              Remove-Item -LiteralPath $runtimeZip -Force
            }
            Compress-Archive -Path (Join-Path $runtimePath '*') -DestinationPath $runtimeZip -Force
            Get-Item -LiteralPath $runtimeZip | Select-Object FullName,Length | Format-Table -AutoSize
          }

      - name: Build Windows installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          if (-not $version) { $version = "1.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion="$version" scripts\windows-installer.iss
        shell: pwsh

      - name: Sign Windows installer
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ env.AZURE_CODESIGN_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_CODESIGN_ACCOUNT_NAME }}
          certificate-profile-name: ${{ env.AZURE_CODESIGN_PROFILE_NAME }}
          files: |
            ${{ github.workspace }}\Output\whooptido-asr-captions-windows-x64-setup.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Verify Windows signatures and hashes
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            @{ Role = 'native-host'; Path = 'dist\whooptido-asr-captions-windows-x64.exe' },
            @{ Role = 'installer'; Path = 'Output\whooptido-asr-captions-windows-x64-setup.exe' }
          )

          $runtimeDirs = @(
            @{ Role = 'whisper-runtime-cuda'; Path = 'dist\whisper-runtime-cuda' },
            @{ Role = 'whisper-runtime-vulkan'; Path = 'dist\whisper-runtime-vulkan' }
          )
          foreach ($runtimeDir in $runtimeDirs) {
            $absoluteRuntimeDir = Join-Path $env:GITHUB_WORKSPACE $runtimeDir.Path
            $runtimeFiles = Get-ChildItem -LiteralPath $absoluteRuntimeDir -File | Where-Object {
              $_.Extension -in @('.exe', '.dll')
            }
            foreach ($runtimeFile in $runtimeFiles) {
              $relative = [System.IO.Path]::GetRelativePath($env:GITHUB_WORKSPACE, $runtimeFile.FullName)
              $files += @{ Role = $runtimeDir.Role; Path = $relative }
            }
          }

          $report = foreach ($file in $files) {
            $path = Join-Path $env:GITHUB_WORKSPACE $file.Path
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Expected Windows artifact not found: $($file.Path)"
            }

            $signature = Get-AuthenticodeSignature -LiteralPath $path
            $hash = Get-FileHash -LiteralPath $path -Algorithm SHA256
            $signer = $signature.SignerCertificate
            $timestamp = $signature.TimeStamperCertificate

            if ($signature.Status -ne 'Valid') {
              throw "Invalid Authenticode signature for $($file.Path): $($signature.Status) $($signature.StatusMessage)"
            }

            [pscustomobject]@{
              role = $file.Role
              path = $file.Path
              sha256 = $hash.Hash.ToLowerInvariant()
              signatureStatus = [string]$signature.Status
              signatureStatusMessage = $signature.StatusMessage
              signerSubject = if ($signer) { $signer.Subject } else { $null }
              signerIssuer = if ($signer) { $signer.Issuer } else { $null }
              signerThumbprint = if ($signer) { $signer.Thumbprint } else { $null }
              timestampSubject = if ($timestamp) { $timestamp.Subject } else { $null }
              timestampIssuer = if ($timestamp) { $timestamp.Issuer } else { $null }
              timestampThumbprint = if ($timestamp) { $timestamp.Thumbprint } else { $null }
            }
          }

          New-Item -ItemType Directory -Force -Path Output | Out-Null
          $report | ConvertTo-Json -Depth 5 | Set-Content -Path Output\windows-signing-report.json -Encoding UTF8
          $report | Format-Table -AutoSize

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: whooptido-asr-captions-windows-x64
          path: dist/whooptido-asr-captions-windows-x64*

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: whooptido-asr-captions-windows-x64-setup
          path: Output/whooptido-asr-captions-windows-x64-setup.exe

      - name: Upload Windows signing report artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-signing-report
          path: Output/windows-signing-report.json

      - name: Upload Windows CUDA whisper runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: whooptido-whisper-runtime-windows-x64-cuda
          path: dist/whooptido-whisper-runtime-windows-x64-cuda.zip

      - name: Upload Windows Vulkan whisper runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: whooptido-whisper-runtime-windows-x64-vulkan
          path: dist/whooptido-whisper-runtime-windows-x64-vulkan.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Flatten artifact directories into release-assets/
          find artifacts -type f | while read f; do
            cp "$f" release-assets/
          done
          # Include installer scripts for direct install and uninstall flows
          cp scripts/install.sh release-assets/
          cp scripts/install.ps1 release-assets/
          cp scripts/uninstall.sh release-assets/
          cp scripts/uninstall.ps1 release-assets/
          # List all assets
          echo "Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## Installation

            **macOS (Apple Silicon):** Download `whooptido-asr-captions-macos-arm.pkg` and double-click to install.
            **Windows with NVIDIA or AMD GPU:** Download `whooptido-asr-captions-windows-x64-setup.exe` and run the installer, or run the PowerShell installer to download only the detected accelerated runtime.

            After installing, restart Chrome and enable Word-for-Word Captions in the Whooptido extension settings.

            Word-for-Word captions require accelerated local speech recognition: NVIDIA CUDA, AMD Vulkan, or Apple Silicon Metal. CPU-only processing is not supported.

            ### Windows signing and SmartScreen

            The Windows setup file is Authenticode-signed. New signed Windows installers can still show Microsoft Defender SmartScreen's "unrecognized app" prompt until the exact file hash builds reputation. Download only from this release, verify the publisher shown by Windows, and compare the SHA-256 in `windows-signing-report.json` if you need extra confirmation.

            Windows builds include accelerated whisper.cpp runtime zips for NVIDIA CUDA and AMD Vulkan. The PowerShell installer selects one of these runtimes from detected hardware and refuses CPU-only installs.
